<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rechazo Hincado</title>

  <style>
    :root {
      --bg: #f5f5f7;
      --card: rgba(255,255,255,0.9);
      --text: #1d1d1f;
      --muted: #6e6e73;
      --line: rgba(0,0,0,0.08);
      --blue: #007aff;
      --green: #0a7f2c;
      --orange: #c46b00;
      --red: #b00020;
      --shadow: 0 18px 45px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 18px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0,122,255,0.12), transparent 32%),
        radial-gradient(circle at bottom right, rgba(52,199,89,0.12), transparent 30%),
        var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 560px;
      margin: 0 auto;
    }

    .hero {
      margin: 12px 0 18px;
    }

    h1 {
      font-size: 30px;
      line-height: 1.05;
      margin: 0;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 26px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .card-title {
      font-size: 13px;
      font-weight: 750;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 650;
      margin: 12px 0 6px;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.94);
      border-radius: 16px;
      padding: 14px;
      font-size: 20px;
      outline: none;
      color: var(--text);
    }

    select {
      font-size: 17px;
      font-weight: 650;
      appearance: none;
    }

    input:focus, select:focus {
      border-color: rgba(0,122,255,0.55);
      box-shadow: 0 0 0 4px rgba(0,122,255,0.12);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 15px;
      font-size: 17px;
      font-weight: 800;
      color: white;
      background: linear-gradient(180deg, #0a84ff, #0066d6);
      box-shadow: 0 12px 25px rgba(0,122,255,0.24);
      margin-top: 14px;
    }

    button:active {
      transform: scale(0.99);
    }

    .result {
      display: none;
    }

    .main-badge {
      display: block;
      text-align: center;
      border-radius: 22px;
      padding: 20px 14px;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: -0.04em;
      margin-bottom: 14px;
    }

    .badge-a {
      color: var(--green);
      background: rgba(52,199,89,0.13);
    }

    .badge-b {
      color: var(--orange);
      background: rgba(255,149,0,0.16);
    }

    .badge-c {
      color: var(--red);
      background: rgba(255,59,48,0.14);
      font-size: 40px;
    }

    .badge-over {
      color: var(--red);
      background: rgba(255,59,48,0.14);
      font-size: 38px;
    }

    .tolerance {
      display: block;
      text-align: center;
      border-radius: 18px;
      padding: 13px;
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .tol-ok {
      color: var(--green);
      background: rgba(52,199,89,0.12);
    }

    .tol-bad {
      color: var(--red);
      background: rgba(255,59,48,0.13);
    }

    .action-box {
      border-radius: 20px;
      padding: 14px;
      background: rgba(0,122,255,0.08);
      border: 1px solid rgba(0,122,255,0.14);
      margin-bottom: 14px;
    }

    .action-title {
      font-size: 13px;
      font-weight: 850;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 7px;
    }

    .action-text {
      font-size: 15px;
      line-height: 1.4;
      color: var(--text);
      font-weight: 600;
    }

    .metrics {
      display: grid;
      gap: 8px;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--line);
      font-size: 15px;
    }

    .metric:last-child {
      border-bottom: 0;
    }

    .metric span:first-child {
      color: var(--muted);
    }

    .metric span:last-child {
      font-weight: 750;
      text-align: right;
    }

    .error {
      color: var(--red);
      font-weight: 750;
      margin-top: 10px;
    }

    small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      margin-top: 10px;
    }

    @media (max-width: 440px) {
      body { padding: 14px; }
      h1 { font-size: 27px; }
      .grid { grid-template-columns: 1fr; }
      .main-badge { font-size: 31px; }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="hero">
      <h1 data-i18n="title">Calculadora de Rechazo</h1>
      <div class="subtitle" data-i18n="subtitle">Hincado con tolerancias de proyecto.</div>
    </section>

    <section class="card">
      <div class="card-title" data-i18n="preferences">Preferencias</div>

      <div class="grid">
        <div>
          <label data-i18n="language">Idioma</label>
          <select id="lang">
            <option value="es">Español</option>
            <option value="en">English</option>
          </select>
        </div>

        <div>
          <label data-i18n="unit">Unidad</label>
          <select id="unit">
            <option value="mm">mm</option>
            <option value="cm">cm</option>
          </select>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-title" data-i18n="projectSettings">Ajustes del proyecto</div>

      <label><span data-i18n="goalDepth">Profundidad objetivo G</span> (<span class="u">mm</span>)</label>
      <input id="G" type="tel" inputmode="decimal" placeholder="Ej. 3200" autocomplete="off">

      <div class="grid">
        <div>
          <label><span data-i18n="tolMinus">Tolerancia negativa Tol−</span> (<span class="u">mm</span>)</label>
          <input id="TMINUS" type="tel" inputmode="decimal" placeholder="Ej. 100" autocomplete="off">
        </div>

        <div>
          <label><span data-i18n="tolPlus">Tolerancia positiva Tol+</span> (<span class="u">mm</span>)</label>
          <input id="TPLUS" type="tel" inputmode="decimal" placeholder="Ej. 100" autocomplete="off">
        </div>
      </div>

      <small id="exampleText"></small>
    </section>

    <section class="card">
      <div class="card-title" data-i18n="measurement">Medición</div>

      <div class="grid">
        <div>
          <label><span data-i18n="exposedHead">Cabeza expuesta E</span> (<span class="u">mm</span>)</label>
          <input id="E" type="tel" inputmode="decimal" placeholder="Ej. 450" autocomplete="off">
        </div>

        <div>
          <label><span data-i18n="totalLength">Longitud total L</span> (<span class="u">mm</span>)</label>
          <input id="L" type="tel" inputmode="decimal" placeholder="Ej. 3500" autocomplete="off">
        </div>
      </div>

      <button id="calc" data-i18n="calculate">Calcular</button>
      <div id="error" class="error"></div>
    </section>

    <section id="result" class="card result">
      <div id="mainBadge" class="main-badge"></div>
      <div id="tolBadge" class="tolerance"></div>

      <div class="action-box">
        <div class="action-title" data-i18n="nextAction">Qué hacer</div>
        <div id="actionText" class="action-text"></div>
      </div>

      <div class="metrics">
        <div class="metric">
          <span data-i18n="exposedDistance">Cabeza expuesta</span>
          <span id="mE"></span>
        </div>

        <div class="metric">
          <span data-i18n="embeddedDepth">Profundidad empotrada</span>
          <span id="mD"></span>
        </div>

        <div class="metric">
          <span data-i18n="target">Objetivo</span>
          <span id="mG"></span>
        </div>

        <div class="metric">
          <span data-i18n="compliance">Cumplimiento</span>
          <span id="mPct"></span>
        </div>

        <div class="metric">
          <span data-i18n="acceptableRange">Rango aceptable</span>
          <span id="mRange"></span>
        </div>

        <div class="metric">
          <span data-i18n="difference">Diferencia vs objetivo</span>
          <span id="mDiff"></span>
        </div>
      </div>

      <small id="ruleText"></small>
    </section>
  </main>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }

    const $ = id => document.getElementById(id);

    const i18n = {
      es: {
        title: "Calculadora de Rechazo",
        subtitle: "Hincado con tolerancias de proyecto.",
        preferences: "Preferencias",
        language: "Idioma",
        unit: "Unidad",
        projectSettings: "Ajustes del proyecto",
        goalDepth: "Profundidad objetivo G",
        tolMinus: "Tolerancia negativa Tol−",
        tolPlus: "Tolerancia positiva Tol+",
        measurement: "Medición",
        exposedHead: "Cabeza expuesta E",
        totalLength: "Longitud total L",
        calculate: "Calcular",
        nextAction: "Qué hacer",
        exposedDistance: "Cabeza expuesta",
        embeddedDepth: "Profundidad empotrada",
        target: "Objetivo",
        compliance: "Cumplimiento",
        acceptableRange: "Rango aceptable",
        difference: "Diferencia vs objetivo",
        rejectionA: "Rechazo A",
        rejectionB: "Rechazo B",
        rejectionC: "Rechazo C",
        overdriven: "Sobrehincado",
        tolOk: "Dentro de tolerancia",
        tolLow: "Fuera de tolerancia por defecto",
        tolHigh: "Fuera de tolerancia por exceso",
        errAll: "Introduce todos los valores.",
        errGoal: "La profundidad objetivo debe ser mayor que 0.",
        errNegative: "Los valores no pueden ser negativos.",
        errExposure: "La cabeza expuesta no puede ser mayor que la longitud total.",
        example: unit => unit === "mm"
          ? "Ejemplo: G = 3200 mm, Tol− = 100 y Tol+ = 100 → rango aceptable 3100–3300 mm."
          : "Ejemplo: G = 320 cm, Tol− = 10 y Tol+ = 10 → rango aceptable 310–330 cm.",
        rules: "Reglas: D = L − E. A = 90–100%, B = 70–<90%, C = <70%. Sobrehincado si >100%.",
        actions: {
          A: "Aceptar solo si también está dentro de tolerancia. Registrar la medición y continuar. Verificar verticalidad, alineación y repintado de la cabeza si aplica.",
          B: "Revisar antes de aceptar. Registrar como observación. Si está fuera de tolerancia, corregir o escalar al responsable técnico/procedimiento del proyecto.",
          C: "No aceptar como conforme. Parar esa posición, registrar rechazo y avisar al responsable técnico. Evaluar re-hincado, predrill, cimentación alternativa o ensayo según el procedimiento del proyecto.",
          OVER: "Detener y revisar. Hay exceso frente al objetivo. No aceptar sin validación técnica o del cliente. Registrar como sobrehincado y confirmar si requiere corrección.",
          TOL_LOW: "Además, está por debajo del rango aceptable. Debe recuperarse profundidad o gestionarse como rechazo según procedimiento.",
          TOL_HIGH: "Además, está por encima del rango aceptable. Requiere validación antes de aceptar.",
          TOL_OK: "La medición queda dentro del rango de tolerancia configurado."
        }
      },
      en: {
        title: "Rejection Calculator",
        subtitle: "Driven pile/screw check with project tolerances.",
        preferences: "Preferences",
        language: "Language",
        unit: "Unit",
        projectSettings: "Project settings",
        goalDepth: "Target depth G",
        tolMinus: "Negative tolerance Tol−",
        tolPlus: "Positive tolerance Tol+",
        measurement: "Measurement",
        exposedHead: "Exposed head E",
        totalLength: "Total length L",
        calculate: "Calculate",
        nextAction: "Next action",
        exposedDistance: "Exposed head",
        embeddedDepth: "Embedded depth",
        target: "Target",
        compliance: "Compliance",
        acceptableRange: "Acceptable range",
        difference: "Difference vs target",
        rejectionA: "Rejection A",
        rejectionB: "Rejection B",
        rejectionC: "Rejection C",
        overdriven: "Overdriven",
        tolOk: "Within tolerance",
        tolLow: "Out of tolerance: too shallow",
        tolHigh: "Out of tolerance: too deep",
        errAll: "Enter all values.",
        errGoal: "Target depth must be greater than 0.",
        errNegative: "Values cannot be negative.",
        errExposure: "Exposed head cannot be greater than total length.",
        example: unit => unit === "mm"
          ? "Example: G = 3200 mm, Tol− = 100 and Tol+ = 100 → acceptable range 3100–3300 mm."
          : "Example: G = 320 cm, Tol− = 10 and Tol+ = 10 → acceptable range 310–330 cm.",
        rules: "Rules: D = L − E. A = 90–100%, B = 70–<90%, C = <70%. Overdriven if >100%.",
        actions: {
          A: "Accept only if also within tolerance. Record the measurement and continue. Check verticality, alignment and repainting of the head if applicable.",
          B: "Review before accepting. Record as an observation. If outside tolerance, correct or escalate to the technical/project procedure.",
          C: "Do not accept as compliant. Stop this position, record the rejection and notify the technical responsible person. Assess re-driving, pre-drilling, alternative foundation or testing according to the project procedure.",
          OVER: "Stop and review. The installed depth exceeds the target. Do not accept without technical/client validation. Record as overdriven and confirm whether correction is required.",
          TOL_LOW: "Also, it is below the acceptable range. Depth must be recovered or managed as rejection according to the procedure.",
          TOL_HIGH: "Also, it is above the acceptable range. Validation is required before acceptance.",
          TOL_OK: "The measurement is within the configured tolerance range."
        }
      }
    };

    let lang = localStorage.getItem("rechazo_lang") || "es";
    let unit = localStorage.getItem("rechazo_unit") || "mm";

    const savedFields = ["G", "TMINUS", "TPLUS", "E", "L"];

    function factor() {
      return unit === "cm" ? 10 : 1;
    }

    function parseNumber(raw) {
      const value = String(raw || "").trim().replace(",", ".");
      if (value === "") return NaN;
      return Number(value);
    }

    function inputToMm(id) {
      return parseNumber($(id).value) * factor();
    }

    function mmToDisplay(mm) {
      const value = unit === "cm" ? mm / 10 : mm;
      const decimals = unit === "cm" ? 1 : 0;
      let text = value.toFixed(decimals);
      text = text.replace(".0", "");
      return `${text} ${unit}`;
    }

    function setText() {
      const t = i18n[lang];

      document.documentElement.lang = lang;
      $("lang").value = lang;
      $("unit").value = unit;

      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (t[key]) el.textContent = t[key];
      });

      document.querySelectorAll(".u").forEach(el => el.textContent = unit);
      $("exampleText").textContent = t.example(unit);
      $("ruleText").textContent = t.rules;

      $("G").placeholder = unit === "mm" ? "Ej. 3200" : "Ej. 320";
      $("TMINUS").placeholder = unit === "mm" ? "Ej. 100" : "Ej. 10";
      $("TPLUS").placeholder = unit === "mm" ? "Ej. 100" : "Ej. 10";
      $("E").placeholder = unit === "mm" ? "Ej. 450" : "Ej. 45";
      $("L").placeholder = unit === "mm" ? "Ej. 3500" : "Ej. 350";

      $("calc").textContent = t.calculate;
    }

    function loadSavedValues() {
      savedFields.forEach(id => {
        const savedMm = localStorage.getItem("rechazo_mm_" + id);
        if (savedMm !== null && savedMm !== "") {
          const displayValue = unit === "cm" ? Number(savedMm) / 10 : Number(savedMm);
          $(id).value = String(displayValue).replace(".0", "");
        }
      });
    }

    function saveFieldAsMm(id) {
      const raw = parseNumber($(id).value);
      if (!Number.isNaN(raw)) {
        localStorage.setItem("rechazo_mm_" + id, String(raw * factor()));
      }
    }

    function setBadge(el, text, cls) {
      el.className = cls;
      el.textContent = text;
    }

    function buildAction(classification, tolStatus) {
      const a = i18n[lang].actions;
      let text = classification === "OVER" ? a.OVER : a[classification];

      if (tolStatus === "LOW") text += " " + a.TOL_LOW;
      else if (tolStatus === "HIGH") text += " " + a.TOL_HIGH;
      else text += " " + a.TOL_OK;

      return text;
    }

    function calculate() {
      const t = i18n[lang];

      const G = inputToMm("G");
      const TMINUS = inputToMm("TMINUS");
      const TPLUS = inputToMm("TPLUS");
      const E = inputToMm("E");
      const L = inputToMm("L");

      const error = $("error");
      const result = $("result");
      const mainBadge = $("mainBadge");
      const tolBadge = $("tolBadge");

      error.textContent = "";
      result.style.display = "none";

      if ([G, TMINUS, TPLUS, E, L].some(v => Number.isNaN(v))) {
        error.textContent = t.errAll;
        return;
      }

      if (G <= 0) {
        error.textContent = t.errGoal;
        return;
      }

      if ([TMINUS, TPLUS, E, L].some(v => v < 0)) {
        error.textContent = t.errNegative;
        return;
      }

      if (E > L) {
        error.textContent = t.errExposure;
        return;
      }

      ["G", "TMINUS", "TPLUS", "L"].forEach(saveFieldAsMm);

      const D = L - E;
      const pct = (D / G) * 100;
      const min = G - TMINUS;
      const max = G + TPLUS;
      const diff = D - G;

      let classification = "";
      let mainText = "";
      let mainClass = "main-badge ";

      if (pct > 100) {
        classification = "OVER";
        mainText = t.overdriven;
        mainClass += "badge-over";
      } else if (pct >= 90) {
        classification = "A";
        mainText = t.rejectionA;
        mainClass += "badge-a";
      } else if (pct >= 70) {
        classification = "B";
        mainText = t.rejectionB;
        mainClass += "badge-b";
      } else {
        classification = "C";
        mainText = t.rejectionC;
        mainClass += "badge-c";
      }

      let tolStatus = "";
      let tolText = "";
      let tolClass = "tolerance ";

      if (D < min) {
        tolStatus = "LOW";
        tolText = t.tolLow;
        tolClass += "tol-bad";
      } else if (D > max) {
        tolStatus = "HIGH";
        tolText = t.tolHigh;
        tolClass += "tol-bad";
      } else {
        tolStatus = "OK";
        tolText = t.tolOk;
        tolClass += "tol-ok";
      }

      setBadge(mainBadge, mainText, mainClass);
      setBadge(tolBadge, tolText, tolClass);

      $("actionText").textContent = buildAction(classification, tolStatus);

      $("mE").textContent = mmToDisplay(E);
      $("mD").textContent = mmToDisplay(D);
      $("mG").textContent = mmToDisplay(G);
      $("mPct").textContent = `${pct.toFixed(1)}%`;
      $("mRange").textContent = `${mmToDisplay(min)} – ${mmToDisplay(max)}`;
      $("mDiff").textContent = `${diff >= 0 ? "+" : ""}${mmToDisplay(Math.abs(diff))}`;

      result.style.display = "block";
    }

    $("lang").addEventListener("change", () => {
      lang = $("lang").value;
      localStorage.setItem("rechazo_lang", lang);
      setText();
      if ($("result").style.display === "block") calculate();
    });

    $("unit").addEventListener("change", () => {
      savedFields.forEach(saveFieldAsMm);
      unit = $("unit").value;
      localStorage.setItem("rechazo_unit", unit);
      loadSavedValues();
      setText();
      if ($("result").style.display === "block") calculate();
    });

    savedFields.forEach(id => {
      $(id).addEventListener("input", () => {
        saveFieldAsMm(id);
        if ($("result").style.display === "block") calculate();
      });
    });

    $("E").addEventListener("input", () => {
      if ($("result").style.display === "block") calculate();
    });

    $("calc").addEventListener("click", calculate);

    $("lang").value = lang;
    $("unit").value = unit;
    loadSavedValues();
    setText();
  </script>
</body>
</html>
